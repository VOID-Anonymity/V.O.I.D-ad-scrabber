name: 🌌 Ritual of Fast Purification (V.O.I.D Update)

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  scrub:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Light Tools
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: 🔮 Execute Fast Scrabber Ritual
        run: python scrabber.py

      - name: 🛡️ Commit and Push Artifacts
        run: |
          git config --local user.email "andrienkovova266@gmail.com"
          git config --local user.name "V.O.I.D Scrabber Bot"
          git add ads.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "🌌 Fast Ritual complete: ads.txt updated [$(date)]" && git push)
